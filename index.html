<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Mess Pass</title>

<style>
  :root{
    --card-max:500px;
    --card-radius:18px;
    --green: #26a42b;
    --brown: #7a2d1e;
    --text:#111;
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background:#f3f3f0;   /* ✅ fixed */
    color:var(--text);
  }

  .topbar{
    width:100%;
    height:68px;
    background:#333;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    position:sticky;
    top:0;
    z-index:30;
  }

  .topbar .handle{
    width:44px;height:6px;border-radius:4px;background:#d6d6d6;
    position:absolute;top:12px;left:50%;transform:translateX(-50%);
  }

  .close-btn{
    position:absolute;
    right:12px;
    top:32px;
    background:transparent;
    border:none;
    font-size:16px;
    color:#f0f0f0;
    font-weight:600;
    cursor:pointer;
  }

  .wrap{display:flex;justify-content:center;padding:18px 8px 40px;}

  .card{
    width:97%;
    max-width:var(--card-max);
    background:#f2f2f2;
    border-radius:var(--card-radius);
    box-shadow:0 3px 8px rgba(0,0,0,0.6), 0 8px 18px rgba(0,0,0,0.12);
    position:relative;
  }

  .timer{
    position:absolute;
    top:-12px;
    right:-10px;
    min-width:45px;
    height:40px;
    border-radius:18px;
    background:#999;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
  }

  .content{padding:18px;}

  .profile-row{
    display:flex;
    gap:24px;
    align-items:center;
    margin-top:10px;
  }

  .avatar{
    width:145px;
    height:148px;
    overflow:hidden;
    box-shadow:0 12px 26px rgba(0,0,0,0.18);
  }

  .avatar-img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center 10%;
  }

  .qr-box{
    width:148px;
    height:138px;
    background:#fff;
    border:1px solid #333;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    box-shadow:0 12px 26px rgba(0,0,0,0.18);
  }

  .qr-img{
    width:105%;
    height:105%;
    object-fit:cover;
  }

  .left-col, .right-col{
    width:145px;
    text-align:center;
  }

  .left-col{ margin-top:8px; }
  .right-col{ margin-top:2px; }

  .meal-title{
    font-size:15px;
    font-weight:500;
  }

  .sid, .line{
    font-size:14px;
    font-weight:500;
    margin-bottom:10px;
  }

  .course{
    font-size:15px;
    font-weight:400;   /* ✅ fixed */
    margin-top:20px;
    margin-bottom:35px;
    text-align:center;
    letter-spacing:0.1px;
  }

  .assigned-mess{
    font-size:15px;
    font-weight:500;
    margin-top:-18px;
    margin-bottom:40px;
    text-align:center;
    letter-spacing:0.1px;
  }

  .dt-row{
    display:flex;
    justify-content:space-between;
    margin-bottom:35px;
    padding:0 64px;
  }

  .dt-row div{
    font-size:18px;
    font-weight:400;
  }

  .approved{
    text-align:center;
    font-size:22px;
    font-weight:600;
    color:#5dc71c;
  }

  .rate-wrap{text-align:center;}

  .rate-btn{
    border-radius:10px;
    border:2px solid var(--brown);
    background:#f3f3f0;
    font-size:15px;
    font-weight:600;
    padding:5px 8px;
  }

  .brown-box{
    background:#6b4242;
    padding:20px;
    border-bottom-left-radius:var(--card-radius);
    border-bottom-right-radius:var(--card-radius);
  }

  .brown-inner{
    background:#fff;
    border-radius:10px;
    height:350px;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  video{
    width:94%;
    height:94%;
    object-fit:contain;
  }

</style>
</head>

<body>

<div class="topbar">
  <div class="handle"></div>
  <span>Mess Pass</span>
  <button class="close-btn" onclick="history.back()">✕</button>
</div>

<div class="wrap">
  <article class="card">

    <div class="timer" id="timerEl">30</div>

    <div class="content">

      <div class="profile-row">

        <div>
          <div class="avatar">
            <img src="profile.jpg" class="avatar-img">
          </div>
          <div class="left-col">
            <div class="sid">12311286</div>
            <div class="line">Jagan Mohan</div>
          </div>
        </div>

        <div>
          <div class="qr-box">
            <img src="qr.png" class="qr-img">
          </div>
          <div class="right-col">
            <div class="meal-title" id="mealTitle"></div>
            <div class="line">Mess-Centre-02</div>
          </div>
        </div>

      </div>

      <div class="course">
        P132: B.Tech. (Computer Science and Engineering)(2023)
      </div>

      <div class="assigned-mess">
        Your Assigned Mess - Mess-Centre-02
      </div>

      <div class="dt-row">
        <div id="dateText"></div>
        <div id="timeText"></div>
      </div>

      <div class="approved">Meal Approved</div>

      <div class="rate-wrap">
        <button class="rate-btn">⭐ RATE US</button>
      </div>

    </div>

    <div class="brown-box">
      <div class="brown-inner">
        <video src="video.mp4" autoplay muted playsinline></video>
      </div>
    </div>

  </article>
</div>

<script>
let sec = 30;
const timerEl = document.getElementById("timerEl");

setInterval(()=>{
  if(sec>1) sec--;
  timerEl.textContent = sec;
},1000);

function pad(n){return n<10?"0"+n:n;}

function updateDT(){
  const now=new Date();
  const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  document.getElementById("dateText").textContent=
    `${m[now.getMonth()]} ${pad(now.getDate())}, ${now.getFullYear()}`;

  let h=now.getHours(), mm=pad(now.getMinutes()), ap=h>=12?"PM":"AM";
  h=h%12||12;
  document.getElementById("timeText").textContent=`${h}:${mm} ${ap}`;
}
updateDT();
setInterval(updateDT,1000);

function updateMeal(){
  const h=new Date().getHours();
  document.getElementById("mealTitle").textContent =
    h<11?"BreakFast":h<16?"Lunch":"Dinner";
}
updateMeal();
</script>

</body>
</html>
